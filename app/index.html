<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON TIC TAC TOE</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Zen Dots', sans-serif;

    background: radial-gradient(circle at 30% 40%, #6f00ff, transparent 60%),
                radial-gradient(circle at 70% 60%, #ff00cc, transparent 60%),
                #1a0033;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #49f2ff;
    text-transform: uppercase;
}

/* MAIN CONTAINER */
.container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px; /* 🔥 CLEAN VERTICAL SPACING */
}

/* TITLE */
h1 {
    margin: 0;
    font-size: 3rem;
    letter-spacing: 3px;
    color: #b829ff;
    text-shadow: 0 0 10px #6f00ff, 0 0 25px #b829ff;
}

/* STATUS TEXT */
.status {
    font-size: 1rem;
    letter-spacing: 2px;
    color: #49f2ff;
    text-shadow: 0 0 10px #49f2ff;
}

/* BOARD */
.board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 90vw;
    max-width: 320px;
}

/* CELLS */
.cell {
    aspect-ratio: 1;
    background: rgba(111, 0, 255, 0.08);
    border: 2px solid #fcfcfc;
    border-radius: 14px;
    font-size: 2.2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: 0 0 10px #6f00ff;
}

.cell:hover {
    transform: scale(1.07);
    box-shadow: 0 0 15px #b829ff, 0 0 25px #49f2ff;
}

/* WIN EFFECT */
.win {
    box-shadow: 0 0 20px #49f2ff, 0 0 40px #49f2ff;
}

/* BUTTON */
button {
    padding: 12px 26px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #6f00ff, #b829ff);
    color: white;
    font-family: 'Zen Dots', sans-serif;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 15px #6f00ff;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 25px #b829ff, 0 0 35px #49f2ff;
}

/* POPUP */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
}

.popup-content {
    background: linear-gradient(135deg, #6f00ff, #0a001a);
    padding: 35px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 0 30px #b829ff;
    animation: pop 0.4s ease;
}

.popup h2 {
    margin-bottom: 20px;
    color: #49f2ff;
    text-shadow: 0 0 10px #49f2ff;
}

@keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* MOBILE */
@media (max-width: 500px) {
    h1 { font-size: 1.4rem; }
    .cell { font-size: 1.8rem; }
}
</style>
</head>

<body>

<div class="container">
    <h1>TIC TAC TOE</h1>
    <div class="status" id="status">PLAYER X TURN</div>

    <div class="board" id="board"></div>

    <button onclick="restartGame()">RESTART</button>
    <div class="status" id="status">BY MADHESHWAR C V</div>
</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="winnerText">PLAYER X WINS</h2>
        <button onclick="closePopup()">PLAY AGAIN</button>
    </div>
</div>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");
const popup = document.getElementById("popup");
const winnerText = document.getElementById("winnerText");

let cells = [];
let currentPlayer = "X";
let gameActive = true;

const winPatterns = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
];

for (let i = 0; i < 9; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.addEventListener("click", handleClick);
    board.appendChild(cell);
    cells.push(cell);
}

function handleClick(e) {
    const cell = e.target;

    if (!gameActive || cell.textContent !== "") return;

    cell.textContent = currentPlayer;

    if (checkWin()) {
        statusText.innerHTML = `PLAYER ${currentPlayer} WINS`;
        winnerText.innerHTML = `🎉 PLAYER ${currentPlayer} WINS 🎉`;
        popup.style.visibility = "visible";
        gameActive = false;
        return;
    }

    if (cells.every(c => c.textContent !== "")) {
        statusText.innerHTML = "DRAW GAME";
        winnerText.innerHTML = "DRAW GAME";
        popup.style.visibility = "visible";
        gameActive = false;
        return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.innerHTML = `PLAYER ${currentPlayer} TURN`;
}

function checkWin() {
    for (let pattern of winPatterns) {
        const [a,b,c] = pattern;

        if (
            cells[a].textContent &&
            cells[a].textContent === cells[b].textContent &&
            cells[a].textContent === cells[c].textContent
        ) {
            cells[a].classList.add("win");
            cells[b].classList.add("win");
            cells[c].classList.add("win");
            return true;
        }
    }
    return false;
}

function restartGame() {
    cells.forEach(cell => {
        cell.textContent = "";
        cell.classList.remove("win");
    });
    currentPlayer = "X";
    gameActive = true;
    statusText.innerHTML = "PLAYER X TURN";
}

function closePopup() {
    popup.style.visibility = "hidden";
    restartGame();
}
</script>

</body>
</html>
